<script>
// ========== TU BASE DE DATOS COMPLETA (FRAGRANCEDB) ==========

// Si no lo pones, no aparecerán resultados.
const fragranceDB = [
  // ... todos tus objetos
];

// ========== FUNCIONES MEJORADAS ==========
function showNotif(msg, isError) {
  const el = document.getElementById('notif');
  if(!el) return;
  document.getElementById('notif-text').textContent = msg;
  document.getElementById('notif-icon').textContent = isError ? '⚠️' : '✓';
  el.classList.toggle('error', isError);
  el.classList.add('visible');
  if(window.notifTimeout) clearTimeout(window.notifTimeout);
  window.notifTimeout = setTimeout(()=>el.classList.remove('visible'), 4000);
}

// Redimensionar imagen para optimizar OCR
function resizeImage(dataUrl, maxWidth = 800, quality = 0.7) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let width = img.width;
      let height = img.height;
      if (width > maxWidth) {
        height = (height * maxWidth) / width;
        width = maxWidth;
      }
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

// Extraer texto: SIEMPRE RESUELVE, nunca lanza error
async function extractTextFromImage(dataUrl) {
  if (typeof Tesseract === 'undefined') return '';
  try {
    const smallImage = await resizeImage(dataUrl, 800, 0.7);
    let resolved = false;
    const timeoutPromise = new Promise((resolve) => {
      setTimeout(() => {
        if (!resolved) resolve('');
      }, 15000); // 15 segundos máximo
    });
    const ocrPromise = Tesseract.recognize(smallImage, 'spa+eng', { logger: () => {} })
      .then(({ data: { text } }) => text);
    const text = await Promise.race([ocrPromise, timeoutPromise]);
    resolved = true;
    return text || '';
  } catch (e) {
    console.warn('OCR falló internamente:', e);
    return '';
  }
}

// Parseo con valores por defecto si no detecta nada
function parseAstroFromText(text) {
  const t = text.toLowerCase();
  const signs = ['aries','tauro','géminis','geminis','cáncer','cancer','leo','virgo','libra','escorpio','sagitario','capricornio','acuario','piscis'];
  const findSign = (keyword) => {
    const idx = t.indexOf(keyword);
    if (idx === -1) return null;
    for (const s of signs) {
      if (t.substring(idx, idx+keyword.length+10).includes(s)) return s.charAt(0).toUpperCase() + s.slice(1);
    }
    return null;
  };
  const sol = findSign('sol') || 'Leo (no detectado)';
  const luna = findSign('luna') || 'Cáncer (no detectado)';
  const asc = findSign('ascendente') || findSign('asc') || 'Tauro (no detectado)';
  const venus = findSign('venus') || 'Tauro (no detectado)';
  const marte = findSign('marte') || 'Aries (no detectado)';
  return {
    posiciones_principales: { sol, luna, ascendente: asc },
    planetas_personales: { venus, marte }
  };
}

function parseHDFromText(text) {
  const t = text.toLowerCase();
  let tipo = 'Generador (no detectado)';
  let autoridad = 'Sacral (no detectada)';
  const tipos = ['manifesting generator','manifestador generador','generator','generador','manifestor','manifestador','projector','proyector','reflector'];
  for (const tp of tipos) {
    if (t.includes(tp)) {
      tipo = tp.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
      break;
    }
  }
  const auths = ['solar plexus','plexo solar','splenic','esplénica','sacral','ego','self','lunar'];
  for (const au of auths) {
    if (t.includes(au)) {
      autoridad = au.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
      break;
    }
  }
  return { informacion_general: { tipo, autoridad } };
}

function extractProfile(natal, hd) {
  const p = {};
  if (natal) {
    p.sol = natal.posiciones_principales?.sol || '';
    p.luna = natal.posiciones_principales?.luna || '';
    p.ascendente = natal.posiciones_principales?.ascendente || '';
    p.venus = natal.planetas_personales?.venus || '';
    p.marte = natal.planetas_personales?.marte || '';
  }
  if (hd) {
    p.tipo = hd.informacion_general?.tipo || '';
    p.autoridad = hd.informacion_general?.autoridad || '';
  }
  return p;
}

function buildAdnSummary(natal, hd) {
  const items = [];
  if (natal) {
    if (natal.posiciones_principales?.sol) items.push({label:'☀️ Sol',value:natal.posiciones_principales.sol});
    if (natal.posiciones_principales?.luna) items.push({label:'🌙 Luna',value:natal.posiciones_principales.luna});
    if (natal.posiciones_principales?.ascendente) items.push({label:'↑ Ascendente',value:natal.posiciones_principales.ascendente});
    if (natal.planetas_personales?.venus) items.push({label:'♀ Venus',value:natal.planetas_personales.venus});
    if (natal.planetas_personales?.marte) items.push({label:'♂ Marte',value:natal.planetas_personales.marte});
  }
  if (hd && hd.informacion_general) {
    if (hd.informacion_general.tipo) items.push({label:'⚡ Tipo HD',value:hd.informacion_general.tipo});
    if (hd.informacion_general.autoridad) items.push({label:'🎯 Autoridad',value:hd.informacion_general.autoridad});
  }
  return items;
}

function scoreFragrance(f, adn, selectedOccasions) {
  let score = 0; const reasons = [];
  const occ = f.occasion.toLowerCase(); const fam = f.family.toLowerCase();
  const sol = adn.sol.toLowerCase(); const luna = adn.luna.toLowerCase();
  const asc = adn.ascendente.toLowerCase(); const venus = adn.venus.toLowerCase();
  const marte = adn.marte.toLowerCase(); const tipo = adn.tipo.toLowerCase();
  const autoridad = adn.autoridad.toLowerCase();

  if (selectedOccasions.size > 0) {
    for (const s of selectedOccasions) {
      const sl = s.toLowerCase();
      if (occ.includes('diario') && sl.includes('diario')) { score+=30; reasons.push('Uso diario'); }
      if (occ.includes('noche') && sl.includes('noche')) { score+=30; reasons.push('Ideal para noche'); }
      if (occ.includes('deporte') && sl.includes('deporte')) { score+=30; reasons.push('Perfecto para deporte'); }
      if (occ.includes('playa') && (sl.includes('playa')||sl.includes('verano'))) { score+=25; reasons.push('Ideal para playa/verano'); }
      if (occ.includes('trabajo') && sl.includes('trabajo')) { score+=25; reasons.push('Profesional para trabajo'); }
      if (occ.includes('citas') && sl.includes('citas')) { score+=25; reasons.push('Seductor para citas'); }
      if (occ.includes('casual') && sl.includes('casual')) { score+=15; reasons.push('Versátil y casual'); }
      if ((occ.includes('eventos')||occ.includes('salidas')) && sl.includes('eventos')) { score+=20; reasons.push('Perfecto para eventos'); }
    }
  }
  // Reglas astrológicas (ejemplo)
  if (sol.includes('cáncer') && (fam.includes('floral')||fam.includes('amaderada'))) { score+=15; reasons.push('Sol en Cáncer: calidez'); }
  if (luna.includes('géminis') && (fam.includes('aromática')||fam.includes('acuática'))) { score+=15; reasons.push('Luna en Géminis: frescura'); }
  if (asc.includes('tauro') && (fam.includes('amaderada')||fam.includes('oriental'))) { score+=12; reasons.push('Ascendente Tauro: sensual'); }
  if (tipo.includes('generador') && (occ.includes('diario')||occ.includes('deporte'))) { score+=8; reasons.push('Tipo Generador: energía'); }
  if (reasons.length === 0) reasons.push('Complementa tu perfil');
  return { score, reason: reasons.slice(0,2).join(' · ') };
}

// ========== MANEJO DE ARCHIVOS ==========
const state = {
  natalData: null, hdData: null,
  natalImage: null, hdImage: null,
  selectedOccasions: new Set(),
  allRecommendations: [], activeFilter: null
};

function showImagePreview(containerId, src) {
  const existing = document.getElementById(containerId + '-preview');
  if (existing) existing.remove();
  const img = document.createElement('img');
  img.id = containerId + '-preview';
  img.src = src;
  img.style.cssText = 'width:100%;max-height:120px;object-fit:cover;border-radius:var(--radius-lg);margin-top:var(--space-3);opacity:0.85;';
  document.getElementById(containerId).appendChild(img);
}

async function handleFileEvent(file, type) {
  if (!file) return;
  if (!file.type.startsWith('image/')) { showNotif('Solo imágenes JPG, PNG o WEBP', true); return; }
  if (file.size > 10 * 1024 * 1024) { showNotif('Imagen muy grande (máx 10 MB)', true); return; }
  const reader = new FileReader();
  reader.onload = async (e) => {
    const dataUrl = e.target.result;
    const checkIcon = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
    if (type === 'natal') {
      state.natalImage = dataUrl; state.natalData = { _imageMode: true };
      document.getElementById('natal-drop').classList.add('has-file');
      document.getElementById('natal-name').textContent = '✓ ' + file.name;
      document.getElementById('natal-icon').innerHTML = checkIcon;
      showImagePreview('natal-drop', dataUrl);
    } else if (type === 'hd') {
      state.hdImage = dataUrl; state.hdData = { _imageMode: true };
      document.getElementById('hd-drop').classList.add('has-file');
      document.getElementById('hd-name').textContent = '✓ ' + file.name;
      document.getElementById('hd-icon').innerHTML = checkIcon;
      showImagePreview('hd-drop', dataUrl);
    } else if (type === 'combined') {
      state.natalImage = dataUrl; state.hdImage = dataUrl;
      state.natalData = { _imageMode: true }; state.hdData = { _imageMode: true };
      document.getElementById('combined-drop').classList.add('has-file');
      document.getElementById('combined-name').textContent = '✓ ' + file.name;
      document.getElementById('combined-icon').innerHTML = checkIcon;
      showImagePreview('combined-drop', dataUrl);
      showImagePreview('natal-drop', dataUrl);
      showImagePreview('hd-drop', dataUrl);
    }
    checkReadyState();
    showNotif('✓ Imagen cargada: ' + file.name, false);
  };
  reader.readAsDataURL(file);
}

function setupUpload(triggerId, fileInputId, type) {
  const trigger = document.getElementById(triggerId);
  const fileInput = document.getElementById(fileInputId);
  if (!trigger || !fileInput) return;
  trigger.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length) handleFileEvent(e.target.files[0], type);
  });
  trigger.addEventListener('dragover', e => { e.preventDefault(); trigger.classList.add('dragover'); });
  trigger.addEventListener('dragleave', () => trigger.classList.remove('dragover'));
  trigger.addEventListener('drop', e => {
    e.preventDefault(); trigger.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFileEvent(file, type);
  });
}

function checkReadyState() {
  document.getElementById('analyze-btn').disabled = !(state.natalData && state.hdData);
}

function toggleCombinedUpload() {
  const s = document.getElementById('combined-section');
  s.style.display = s.style.display === 'none' ? 'block' : 'none';
}

function toggleChip(el) {
  el.classList.toggle('active');
  const val = el.dataset.val;
  if (state.selectedOccasions.has(val)) state.selectedOccasions.delete(val);
  else state.selectedOccasions.add(val);
}

// ========== ANÁLISIS PRINCIPAL (NUNCA FALLA) ==========
async function analyzeProfile() {
  if (!state.natalData || !state.hdData) { showNotif('Sube ambas imágenes primero', true); return; }
  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('loading').classList.add('visible');
  document.getElementById('results').classList.remove('visible');

  const steps = ['Leyendo imágenes...','Extrayendo texto (puede tardar)','Procesando datos','Generando recomendaciones'];
  let stepIdx = 0;
  const stepEl = document.getElementById('loading-step');
  const interval = setInterval(() => { stepIdx = (stepIdx+1)%steps.length; stepEl.textContent = steps[stepIdx]; }, 800);

  try {
    let natalParsed = state.natalData;
    let hdParsed = state.hdData;
    let ocrFalló = false;

    if (state.natalData._imageMode && state.natalImage) {
      stepEl.textContent = 'Analizando carta natal (OCR)...';
      const text = await extractTextFromImage(state.natalImage);
      if (text && text.length > 20) {
        natalParsed = parseAstroFromText(text);
      } else {
        ocrFalló = true;
        natalParsed = { posiciones_principales: { sol: 'Lectura no detectada', luna: 'Lectura no detectada', ascendente: 'Lectura no detectada' }, planetas_personales: { venus: '-', marte: '-' } };
      }
    }
    if (state.hdData._imageMode && state.hdImage) {
      stepEl.textContent = 'Analizando diseño humano (OCR)...';
      const text = await extractTextFromImage(state.hdImage);
      if (text && text.length > 20) {
        hdParsed = parseHDFromText(text);
      } else {
        ocrFalló = true;
        hdParsed = { informacion_general: { tipo: 'No detectado', autoridad: 'No detectada' } };
      }
    }
    if (ocrFalló) {
      showNotif('⚠️ No se pudo leer el texto de las imágenes. Se usarán datos genéricos, pero igual recibirás recomendaciones.', false);
    }

    state.natalData = natalParsed;
    state.hdData = hdParsed;
    const adnProfile = extractProfile(natalParsed, hdParsed);
    const scored = fragranceDB.map(f => {
      const {score, reason} = scoreFragrance(f, adnProfile, state.selectedOccasions);
      return {...f, score, reason};
    }).sort((a,b) => b.score - a.score);
    state.allRecommendations = scored;

    const adnItems = buildAdnSummary(natalParsed, hdParsed);
    document.getElementById('adn-grid').innerHTML = adnItems.map(i => `<div class="adn-item"><div class="adn-item-label">${i.label}</div><div class="adn-item-value">${i.value}</div></div>`).join('');

    const families = [...new Set(fragranceDB.map(f=>f.family))];
    document.getElementById('filter-chips').innerHTML = `<button class="filter-btn active" onclick="setFilter(null,this)">Todas</button>${families.map(f=>`<button class="filter-btn" onclick="setFilter('${f.replace(/'/g, "\\'")}',this)">${f}</button>`).join('')}`;
    renderResults(scored);
    showNotif(`✓ Listo! ${scored.length} fragancias recomendadas.`, false);
  } catch (err) {
    console.error(err);
    showNotif('Error inesperado, pero igual mostraremos algunas fragancias.', true);
    // Mostrar datos de ejemplo
    const dummy = fragranceDB.slice(0, 20).map(f => ({...f, score: 50, reason: 'Recomendación de prueba'}));
    state.allRecommendations = dummy;
    renderResults(dummy);
  } finally {
    clearInterval(interval);
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('results').classList.add('visible');
    document.getElementById('analyze-btn').disabled = false;
    document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
  }
}

function renderResults(data) {
  const rankClasses = ['gold','silver','bronze'];
  document.getElementById('results-counter').textContent = data.length + ' fragancias encontradas';
  if (data.length === 0) {
    document.getElementById('results-grid').innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><h3>Sin resultados</h3><p>Intenta con otros filtros o sube imágenes más claras.</p></div>';
    return;
  }
  document.getElementById('results-grid').innerHTML = data.map((f,i) => {
    const rc = i<3 ? rankClasses[i] : '';
    const rl = i<3 ? ['🥇','🥈','🥉'][i] : (i+1);
    const tags = f.occasion.split(',').map(o=>`<span class="tag occasion">${o.trim()}</span>`).join('');
    return `<div class="fragrance-card" style="animation:fadeIn 0.4s ease ${i*0.05}s both;">
      <div class="card-header">
        <div class="card-rank ${rc}">${rl}</div>
        <span class="match-score">${f.score>0?f.score+' pts':'Complemento'}</span>
      </div>
      <div class="card-body">
        <div class="card-code">${f.code}</div>
        <div class="card-name">${f.name}</div>
        <div class="card-brand">${f.brand}</div>
        <div class="card-tags"><span class="tag family">${f.family}</span>${tags}</div>
        <div class="card-reason">${f.reason}</div>
      </div>
    </div>`;
  }).join('');
}

function setFilter(family, btn) {
  state.activeFilter = family;
  document.querySelectorAll('#filter-chips .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterResults();
}

function filterResults() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let filtered = state.allRecommendations;
  if (state.activeFilter) filtered = filtered.filter(f=>f.family===state.activeFilter);
  if (q) filtered = filtered.filter(f=>f.name.toLowerCase().includes(q)||f.brand.toLowerCase().includes(q)||f.family.toLowerCase().includes(q)||f.occasion.toLowerCase().includes(q));
  renderResults(filtered);
}

// ========== INICIALIZACIÓN ==========
document.addEventListener('DOMContentLoaded', () => {
  setupUpload('natal-drop', 'natal-file', 'natal');
  setupUpload('hd-drop', 'hd-file', 'hd');
  setupUpload('combined-drop', 'combined-file', 'combined');
  document.querySelectorAll('.context-chip').forEach(chip => {
    chip.addEventListener('click', () => toggleChip(chip));
  });
  // Theme
  const themeToggle = document.querySelector('[data-theme-toggle]');
  const root = document.documentElement;
  let theme = root.getAttribute('data-theme') || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  root.setAttribute('data-theme', theme);
  const updateThemeIcon = () => {
    if (!themeToggle) return;
    themeToggle.innerHTML = theme === 'dark'
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  };
  updateThemeIcon();
  if (themeToggle) themeToggle.addEventListener('click', () => { theme = theme === 'dark' ? 'light' : 'dark'; root.setAttribute('data-theme', theme); updateThemeIcon(); });
});
</script>
</body>
